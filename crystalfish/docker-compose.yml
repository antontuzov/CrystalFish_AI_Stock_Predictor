version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: crystalfish-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crystalfish
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crystalfish-network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: crystalfish-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crystalfish-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crystalfish-backend
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/crystalfish
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/crystalfish
      - REDIS_URL=redis://redis:6379/0
      - REDIS_BROKER_URL=redis://redis:6379/1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-change-in-production}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - FRONTEND_URL=http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crystalfish-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crystalfish-celery
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/crystalfish
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/crystalfish
      - REDIS_URL=redis://redis:6379/0
      - REDIS_BROKER_URL=redis://redis:6379/1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-change-in-production}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crystalfish-network
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crystalfish-beat
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/crystalfish
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@postgres:5432/crystalfish
      - REDIS_URL=redis://redis:6379/0
      - REDIS_BROKER_URL=redis://redis:6379/1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret-change-in-production}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crystalfish-network
    command: celery -A app.worker.celery_app beat --loglevel=info

  # Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crystalfish-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - crystalfish-network

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  crystalfish-network:
    driver: bridge