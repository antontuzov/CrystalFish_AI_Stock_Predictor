<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrystalFish - API Test Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #2a2a5a;
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7b2fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo svg {
            width: 40px;
            height: 40px;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .status-badge.degraded {
            background: rgba(255, 187, 0, 0.1);
            color: #ffbb00;
            border-color: #ffbb00;
        }

        .status-badge.unhealthy {
            background: rgba(255, 0, 85, 0.1);
            color: #ff0055;
            border-color: #ff0055;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(26, 26, 58, 0.6);
            border: 1px solid #2a2a5a;
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .card h3 {
            font-size: 14px;
            color: #8888aa;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card .value {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #7b2fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card .value.success {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card .value.warning {
            background: linear-gradient(135deg, #ffbb00, #ff8800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card .value.danger {
            background: linear-gradient(135deg, #ff0055, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section {
            background: rgba(26, 26, 58, 0.6);
            border: 1px solid #2a2a5a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .agent-chat {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .agent-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2fff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            flex-shrink: 0;
        }

        .chat-content {
            flex: 1;
        }

        .chat-message {
            background: rgba(15, 15, 42, 0.8);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .chat-input {
            flex: 1;
            background: rgba(15, 15, 42, 0.8);
            border: 1px solid #2a2a5a;
            border-radius: 8px;
            padding: 12px 16px;
            color: #ffffff;
            font-size: 14px;
        }

        .chat-input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .btn {
            background: linear-gradient(135deg, #00d4ff, #7b2fff);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: rgba(26, 26, 58, 0.8);
            border: 1px solid #2a2a5a;
        }

        .endpoint-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .endpoint-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(15, 15, 42, 0.8);
            border-radius: 8px;
        }

        .endpoint-method {
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 12px;
        }

        .endpoint-method.GET {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        .endpoint-method.POST {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .endpoint-path {
            flex: 1;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 13px;
        }

        .endpoint-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .endpoint-status.success {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .endpoint-status.error {
            background: rgba(255, 0, 85, 0.2);
            color: #ff0055;
        }

        .recommendations {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .recommendation {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: rgba(15, 15, 42, 0.8);
            border-radius: 8px;
            border-left: 3px solid #00d4ff;
        }

        .recommendation-icon {
            font-size: 20px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            font-size: 16px;
            color: #8888aa;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0, 212, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert.critical {
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid #ff0055;
        }

        .alert.warning {
            background: rgba(255, 187, 0, 0.1);
            border: 1px solid #ffbb00;
        }

        .alert.info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
        }

        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #7b2fff);
            border: none;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.1);
        }

        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="200" cy="200" rx="120" ry="60" fill="url(#grad1)" opacity="0.9"/>
                    <circle cx="95" cy="195" r="12" fill="#ffffff" opacity="0.9"/>
                    <circle cx="93" cy="193" r="6" fill="#00d4ff" opacity="0.9"/>
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#7b2fff;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                </svg>
                CrystalFish API Dashboard
            </div>
            <div class="status-badge" id="healthStatus">Checking...</div>
        </header>

        <!-- Stats Grid -->
        <div class="grid">
            <div class="card">
                <h3>Performance Score</h3>
                <div class="value" id="perfScore">--</div>
            </div>
            <div class="card">
                <h3>Success Rate</h3>
                <div class="value success" id="successRate">--</div>
            </div>
            <div class="card">
                <h3>Avg Response Time</h3>
                <div class="value" id="avgResponse">--</div>
            </div>
            <div class="card">
                <h3>Active Alerts</h3>
                <div class="value warning" id="activeAlerts">--</div>
            </div>
        </div>

        <!-- API Guardian Chat -->
        <div class="section">
            <h2>🦉 API Guardian</h2>
            <div class="agent-chat">
                <div class="agent-avatar">🦉</div>
                <div class="chat-content">
                    <div class="chat-message" id="agentMessage">
                        <div class="loading">
                            <div class="spinner"></div>
                            Initializing API Guardian...
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <input type="text" class="chat-input" id="chatInput" placeholder="Ask about API performance..." />
                        <button class="btn" onclick="sendChat()">Send</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Monitored Endpoints -->
        <div class="section">
            <h2>🔌 Monitored Endpoints</h2>
            <div class="endpoint-list" id="endpointList">
                <div class="loading">
                    <div class="spinner"></div>
                    Loading endpoints...
                </div>
            </div>
        </div>

        <!-- Recommendations -->
        <div class="section">
            <h2>💡 Recommendations</h2>
            <div class="recommendations" id="recommendations">
                <div class="loading">
                    <div class="spinner"></div>
                    Generating recommendations...
                </div>
            </div>
        </div>

        <!-- Alerts -->
        <div class="section" id="alertsSection" style="display: none;">
            <h2>⚠️ Active Alerts</h2>
            <div id="alertsList"></div>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshData()" title="Refresh data">🔄</button>

    <script>
        const API_BASE = 'http://localhost:8000/api-test';

        async function fetchDashboard() {
            try {
                const response = await fetch(`${API_BASE}/dashboard`);
                if (!response.ok) throw new Error('Failed to fetch dashboard');
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error('Error fetching dashboard:', error);
            }
        }

        async function fetchAgentSummary() {
            try {
                const response = await fetch(`${API_BASE}/agent/summary`);
                if (!response.ok) throw new Error('Failed to fetch agent summary');
                const data = await response.json();
                updateAgentInfo(data);
            } catch (error) {
                console.error('Error fetching agent summary:', error);
            }
        }

        async function fetchEndpoints() {
            try {
                const response = await fetch(`${API_BASE}/endpoints`);
                if (!response.ok) throw new Error('Failed to fetch endpoints');
                const data = await response.json();
                updateEndpoints(data);
            } catch (error) {
                console.error('Error fetching endpoints:', error);
            }
        }

        function updateDashboard(data) {
            // Update health status
            const healthEl = document.getElementById('healthStatus');
            healthEl.textContent = data.health.status.toUpperCase();
            healthEl.className = 'status-badge ' + (data.health.status === 'healthy' ? '' : data.health.status);

            // Update stats
            document.getElementById('perfScore').textContent = data.state.success_rate >= 95 ? '100' : Math.round(data.state.success_rate);
            document.getElementById('successRate').textContent = data.state.success_rate.toFixed(1) + '%';
            document.getElementById('avgResponse').textContent = Math.round(data.state.average_response_time_ms) + 'ms';
            
            const alertsCount = data.state.recent_failures?.length || 0;
            document.getElementById('activeAlerts').textContent = alertsCount;

            // Update recommendations
            const recEl = document.getElementById('recommendations');
            if (data.recommendations && data.recommendations.length > 0) {
                recEl.innerHTML = data.recommendations.map(rec => `
                    <div class="recommendation">
                        <span class="recommendation-icon">💡</span>
                        <span>${rec}</span>
                    </div>
                `).join('');
            } else {
                recEl.innerHTML = '<div class="recommendation"><span class="recommendation-icon">✅</span><span>All systems operating normally</span></div>';
            }

            // Update alerts section
            const alertsSection = document.getElementById('alertsSection');
            const alertsList = document.getElementById('alertsList');
            if (alertsCount > 0) {
                alertsSection.style.display = 'block';
                alertsList.innerHTML = data.state.recent_failures.map(alert => `
                    <div class="alert critical">
                        <span>⚠️</span>
                        <span>Failed: ${alert.endpoint} - ${alert.error || 'Unknown error'}</span>
                    </div>
                `).join('');
            } else {
                alertsSection.style.display = 'none';
            }
        }

        function updateAgentInfo(data) {
            const messageEl = document.getElementById('agentMessage');
            messageEl.innerHTML = `
                <strong>${data.agent_name}</strong> (${data.agent_role})<br/><br/>
                Hello! I'm monitoring the API health. Currently:
                <ul style="margin: 12px 0 12px 20px; line-height: 1.8;">
                    <li>Health Status: <strong style="color: ${data.health_status === 'healthy' ? '#00ff88' : '#ffbb00'}">${data.health_status}</strong></li>
                    <li>Performance Score: <strong>${data.performance_score}/100</strong></li>
                    <li>Success Rate: <strong>${data.success_rate.toFixed(1)}%</strong></li>
                    <li>Avg Response Time: <strong>${Math.round(data.average_response_time_ms)}ms</strong></li>
                </ul>
                ${data.recommendations && data.recommendations.length > 0 ? '<strong>My recommendations:</strong><br/>' + data.recommendations.map(r => '• ' + r).join('<br/>') : ''}
            `;
        }

        function updateEndpoints(data) {
            const listEl = document.getElementById('endpointList');
            if (data.endpoints && data.endpoints.length > 0) {
                listEl.innerHTML = data.endpoints.map(ep => `
                    <div class="endpoint-item">
                        <div style="display: flex; align-items: center;">
                            <span class="endpoint-method ${ep.method}">${ep.method}</span>
                            <span class="endpoint-path">${ep.endpoint}</span>
                        </div>
                        <span class="endpoint-status success">✓ Monitored</span>
                    </div>
                `).join('');
            }
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            const messageEl = document.getElementById('agentMessage');
            messageEl.innerHTML = '<div class="loading"><div class="spinner"></div>Thinking...</div>';

            try {
                const response = await fetch(`${API_BASE}/agent/chat?message=${encodeURIComponent(message)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                messageEl.innerHTML = `<strong>${data.agent_name}:</strong><br/><br/>${data.response}`;
            } catch (error) {
                messageEl.innerHTML = 'Error: Failed to get response from API Guardian';
            }

            input.value = '';
        }

        function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('spinning');
            
            Promise.all([
                fetchDashboard(),
                fetchAgentSummary(),
                fetchEndpoints()
            ]).finally(() => {
                setTimeout(() => btn.classList.remove('spinning'), 500);
            });
        }

        // Handle Enter key in chat input
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChat();
        });

        // Initial load
        refreshData();

        // Auto-refresh every 30 seconds
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
