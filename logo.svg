<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Gradient for fish body -->
    <linearGradient id="crystalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7b2fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00aa;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for fins -->
    <linearGradient id="finGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7b2fff;stop-opacity:0.6" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Sparkle filter -->
    <filter id="sparkle" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="2" specularConstant="1" specularExponent="20" lighting-color="#ffffff" result="specular">
        <fePointLight x="0" y="-100" z="200"/>
      </feSpecularLighting>
      <feComposite in="specular" in2="SourceAlpha" operator="in" result="specularComposite"/>
      <feComposite in="SourceGraphic" in2="specularComposite" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="composite"/>
      <feMerge>
        <feMergeNode in="composite"/>
        <feMergeNode in="specularComposite"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#0a0a1a" stroke="#1a1a3a" stroke-width="2"/>
  
  <!-- Decorative circles (bubbles) -->
  <circle cx="80" cy="120" r="8" fill="#00d4ff" opacity="0.3">
    <animate attributeName="cy" values="120;100;120" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="280" r="6" fill="#7b2fff" opacity="0.3">
    <animate attributeName="cy" values="280;260;280" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="100" r="5" fill="#ff00aa" opacity="0.2">
    <animate attributeName="cy" values="100;80;100" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Fish body (stylized crystal fish) -->
  <g filter="url(#glow)">
    <!-- Main body -->
    <ellipse cx="200" cy="200" rx="120" ry="60" fill="url(#crystalGradient)" opacity="0.9"/>
    
    <!-- Body facets (crystal-like) -->
    <path d="M 100 200 L 140 180 L 140 220 Z" fill="#ffffff" opacity="0.3"/>
    <path d="M 150 200 L 190 175 L 190 225 Z" fill="#ffffff" opacity="0.25"/>
    <path d="M 200 200 L 240 180 L 240 220 Z" fill="#ffffff" opacity="0.2"/>
    <path d="M 250 200 L 280 190 L 280 210 Z" fill="#ffffff" opacity="0.15"/>
  </g>
  
  <!-- Tail fin -->
  <g filter="url(#glow)">
    <path d="M 310 200 L 370 170 L 370 230 Z" fill="url(#finGradient)" opacity="0.8"/>
    <path d="M 310 200 L 360 180 L 360 220 Z" fill="url(#finGradient)" opacity="0.6"/>
  </g>
  
  <!-- Dorsal fin (top) -->
  <g filter="url(#glow)">
    <path d="M 180 145 L 200 110 L 220 145 Z" fill="url(#finGradient)" opacity="0.7"/>
  </g>
  
  <!-- Pectoral fin (side) -->
  <g filter="url(#glow)">
    <path d="M 190 200 L 170 230 L 210 230 Z" fill="url(#finGradient)" opacity="0.6"/>
  </g>
  
  <!-- Eye -->
  <g filter="url(#glow)">
    <circle cx="95" cy="195" r="12" fill="#ffffff" opacity="0.9"/>
    <circle cx="93" cy="193" r="6" fill="#00d4ff" opacity="0.9"/>
    <circle cx="91" cy="191" r="3" fill="#ffffff" opacity="1"/>
  </g>
  
  <!-- Sparkles around fish -->
  <g filter="url(#sparkle)">
    <path d="M 60 180 L 65 175 L 70 180 L 65 185 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M 340 160 L 345 155 L 350 160 L 345 165 Z" fill="#ffffff" opacity="0.6"/>
    <path d="M 200 80 L 205 75 L 210 80 L 205 85 Z" fill="#ffffff" opacity="0.7"/>
    <path d="M 150 260 L 155 255 L 160 260 L 155 265 Z" fill="#ffffff" opacity="0.5"/>
    <path d="M 280 250 L 285 245 L 290 250 L 285 255 Z" fill="#ffffff" opacity="0.6"/>
  </g>
  
  <!-- Network nodes (representing AI agents) -->
  <g opacity="0.4">
    <circle cx="120" cy="150" r="4" fill="#00d4ff"/>
    <circle cx="160" cy="130" r="3" fill="#7b2fff"/>
    <circle cx="240" cy="130" r="3" fill="#ff00aa"/>
    <circle cx="280" cy="150" r="4" fill="#00ffff"/>
    <circle cx="120" cy="250" r="3" fill="#7b2fff"/>
    <circle cx="280" cy="250" r="4" fill="#00d4ff"/>
    
    <!-- Connection lines -->
    <line x1="120" y1="150" x2="160" y2="130" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="160" y1="130" x2="240" y2="130" stroke="#7b2fff" stroke-width="1" opacity="0.5"/>
    <line x1="240" y1="130" x2="280" y2="150" stroke="#ff00aa" stroke-width="1" opacity="0.5"/>
    <line x1="120" y1="250" x2="280" y2="250" stroke="#00ffff" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#crystalGradient)" text-anchor="middle" filter="url(#glow)">CrystalFish</text>
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="12" fill="#8888aa" text-anchor="middle">AI Swarm Intelligence</text>
</svg>
